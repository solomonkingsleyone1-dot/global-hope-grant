<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Status | Global Hope Grant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}

header{
background:#003c88;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
margin-bottom:20px;
}

.status{
font-weight:bold;
color:#003c88;
}

button{
background:#003c88;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Global Hope Grant</h1>
<h2>Application Status</h2>
</header>

<div class="container">

<div id="results">
Loading...
</div>

<button onclick="window.location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyAi1Pbe-HDAsyEYnOyYzgb3HugKQt-4rv8",
authDomain:"global-hope-grant.firebaseapp.com",
projectId:"global-hope-grant",
storageBucket:"global-hope-grant.firebasestorage.app",
messagingSenderId:"253915548678",
appId:"1:253915548678:web:dff5dd9fcd0a9ab821c787"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const results=document.getElementById("results");

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location="login.html";
return;
}

const q=query(
collection(db,"applications"),
where("email","==",user.email)
);

onSnapshot(q,(snapshot)=>{

results.innerHTML="";

if(snapshot.empty){
results.innerHTML="<div class='card'><h3>No application submitted yet.</h3></div>";
return;
}

snapshot.forEach(doc=>{

const data=doc.data();

results.innerHTML+=`

<div class="card">

<h3>${data.fullname}</h3>

<p><strong>Email:</strong> ${data.email}</p>

<p><strong>Phone:</strong> ${data.phone}</p>

<p><strong>Country:</strong> ${data.country}</p>

<p><strong>Grant Type:</strong> ${data.grantType}</p>

<p><strong>Amount:</strong> $${data.amount}</p>

<p><strong>Status:</strong>
<span class="status">${data.status}</span>
</p>

</div>

`;

});

});

});

</script>

</body>
</html>
