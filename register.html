<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Global Hope Grant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="container">
<h1>Global Hope Grant</h1>

<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</nav>
</div>
</header>

<section class="hero">
<div class="container">

<h2>Create Account</h2>

<form onsubmit="return false;">

<input type="text" id="fullname" placeholder="Full Name" required><br><br>

<input type="email" id="email" placeholder="Email Address" required><br><br>

<input type="tel" id="phone" placeholder="Phone Number" required><br><br>

<input type="password" id="password" placeholder="Password" required><br><br>

<button type="button" onclick="registerUser()">Register</button>

</form>

<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAi1Pbe-HDAsyEYnOyYzgb3HugKQt-4rv8",
  authDomain: "global-hope-grant.firebaseapp.com",
  projectId: "global-hope-grant",
  storageBucket: "global-hope-grant.firebasestorage.app",
  messagingSenderId: "253915548678",
  appId: "1:253915548678:web:dff5dd9fcd0a9ab821c787"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.registerUser = function(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Registration successful!");
window.location.href="login.html";
})
.catch((error)=>{
alert(error.message);
});

}
</script>

</body>
</html>
