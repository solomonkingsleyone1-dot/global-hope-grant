<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Global Hope Grant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="container">
<h1>Global Hope Grant</h1>

<nav>
<a href="index.html">Home</a>
<a href="register.html">Register</a>
</nav>
</div>
</header>

<section class="hero">
<div class="container">

<h2>Login</h2>
<p>Sign in to continue your grant application.</p>

<form onsubmit="return false;">
<input type="email" id="loginEmail" placeholder="Email Address" required><br><br>

<input type="password" id="loginPassword" placeholder="Password" required><br><br>

<button type="button" onclick="loginUser()">Login</button>
</form>

<p style="margin-top:20px;">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAi1Pbe-HDAsyEYnOyYzgb3HugKQt-4rv8",
  authDomain: "global-hope-grant.firebaseapp.com",
  projectId: "global-hope-grant",
  storageBucket: "global-hope-grant.firebasestorage.app",
  messagingSenderId: "253915548678",
  appId: "1:253915548678:web:dff5dd9fcd0a9ab821c787"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = function () {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
            alert("Login successful!");
            window.location.href = "dashboard.html";
        })
        .catch((error) => {
            console.log(error.code);
            console.log(error.message);

            if (error.code === "auth/invalid-credential") {
                alert("Incorrect email or password.");
            } else if (error.code === "auth/user-not-found") {
                alert("Account not found.");
            } else if (error.code === "auth/wrong-password") {
                alert("Wrong password.");
            } else if (error.code === "auth/invalid-email") {
                alert("Invalid email address.");
            } else {
                alert(error.code + "\n" + error.message);
            }
        });
}
</script>

</body>
</html>
