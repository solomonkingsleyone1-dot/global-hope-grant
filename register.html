<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Global Hope Grant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Global Hope Grant</h1>
</header>

<section class="hero">
    <h2>Create Your Account</h2>

    <form>
        <input type="text" placeholder="Full Name" required><br><br>

        <input type="email" placeholder="Email Address" required><br><br>

        <input type="tel" placeholder="WhatsApp Number" required><br><br>

        <input type="password" placeholder="Password" required><br><br>

        <button type="submit">Register</button>
    </form>

    <br>

    <p>Already have an account? <a href="login.html">Login here</a></p>
</section>

</body>
</html>
