<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Application | Global Hope Grant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>Global Hope Grant</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">

        <h2>Grant Application Form</h2>
        <p>Please complete the form below.</p>

        <form id="applicationForm">

            <input type="text" id="fullName" placeholder="Full Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <input type="tel" id="phone" placeholder="WhatsApp Number" required>

            <input type="text" id="country" placeholder="Country" required>

            <textarea id="reason" placeholder="Why are you applying for this grant?" rows="5" required></textarea>

            <button type="submit">Submit Application</button>

        </form>

    </div>
</section>

<script src="script.js"></script>

</body>
</html>
